name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # 允许创建 GitHub Release
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      # ── 确定版本号：tag 优先，否则回落到 csproj ──────────────────────────
      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match '^refs/tags/v(.+)$') {
            $ver = $Matches[1]
            Write-Host "Version from tag: $ver"
          } else {
            $xml = [xml](Get-Content OptiMemory.csproj)
            $raw = $xml.Project.PropertyGroup.InformationalVersion |
                   Where-Object { $_ } | Select-Object -First 1
            $ver = $raw -replace '^v', ''
            Write-Host "Version from csproj: $ver"
          }
          "value=$ver"  >> $env:GITHUB_OUTPUT
          "tag=v$ver"   >> $env:GITHUB_OUTPUT

      # ── Release 构建（框架依赖，非单文件，供安装包打包）──────────────────
      - name: Publish release build
        run: >
          dotnet publish OptiMemory.csproj
          -c Release -r win-x64 --self-contained false
          -p:PublishSingleFile=false
          -p:InformationalVersion=v${{ steps.version.outputs.value }}
          -p:AssemblyVersion=${{ steps.version.outputs.value }}.0
          -p:FileVersion=${{ steps.version.outputs.value }}.0
          -o publish/release

      # ── 单文件发布（框架依赖）──────────────────────────────────────────────
      - name: Publish single-file
        run: >
          dotnet publish OptiMemory.csproj
          -c Release -r win-x64 --self-contained false
          -p:PublishSingleFile=true
          -p:InformationalVersion=v${{ steps.version.outputs.value }}
          -p:AssemblyVersion=${{ steps.version.outputs.value }}.0
          -p:FileVersion=${{ steps.version.outputs.value }}.0
          -o publish/single-file

      # ── 用 Inno Setup CI 脚本打安装包（不依赖中文语言包）────────────────
      - name: Build installer
        run: iscc /DMyAppVersion=${{ steps.version.outputs.value }} installer\OptiMemory.CI.iss

      # ── 上传 Artifacts（每次构建均保留）──────────────────────────────────
      - name: Upload single-file artifact
        uses: actions/upload-artifact@v4
        with:
          name: OptiMemory-v${{ steps.version.outputs.value }}-single-file
          path: publish/single-file/OptiMemory.exe
          if-no-files-found: error

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OptiMemory-v${{ steps.version.outputs.value }}-Setup
          path: dist/OptiMemory-*-Setup.exe
          if-no-files-found: error

      # ── 推送 tag 时自动创建 GitHub Release ────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: OptiMemory v${{ steps.version.outputs.value }}
          prerelease: true
          files: |
            dist/OptiMemory-*-Setup.exe
            publish/single-file/OptiMemory.exe
